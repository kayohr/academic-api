services:
  api:
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/academic_api
      JWT_SECRET: dev_secret_change_in_production_must_be_32_chars
      JWT_EXPIRES_MINUTES: "15"
      JWT_REFRESH_EXPIRES_DAYS: "7"
      DEBUG: "true"
      LOG_LEVEL: debug
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: academic_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
